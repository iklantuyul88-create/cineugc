<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CineUGC</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>
tailwind.config={
    theme:{
        extend:{
            colors:{
                dark:'#0A0A0A',
                darker:'#050505',
                'dark-gray':'#121212',
                'medium-gray':'#1E1E1E',
                'light-gray':'#2A2A2A',
                'accent-gold':'#D4AF37'
            },
            fontFamily:{inter:['Inter','system-ui']}
        }
    }
}
</script>
<style>
.glass{background:rgba(30,30,30,0.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1)}
.glass-light{background:rgba(42,42,42,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08)}
.hidden{display:none !important;}
</style>
</head>
<body class="bg-dark text-white font-inter min-h-screen">
<nav class="glass fixed top-0 left-0 right-0 z-50 px-4 py-3">
<div class="max-w-7xl mx-auto flex justify-between items-center">
<div class="flex items-center space-x-2">
    <i class="fa fa-film text-accent-gold"></i>
    <h1 class="text-xl font-bold">CineUGC</h1>
</div>
<button class="glass-light px-4 py-2 rounded-lg">
    <i class="fa fa-user-circle mr-2"></i>Akun
</button>
</div>
</nav>

<main class="pt-20 pb-28 px-4 max-w-7xl mx-auto">
<div class="mb-8">
<div class="flex justify-between mb-2">
    <h2 class="text-2xl font-bold">Buat Iklan UGC Sinematik</h2>
    <span class="text-gray-400">Langkah <span id="stepNum">1</span>/6</span>
</div>
<div class="w-full bg-medium-gray rounded-full h-2">
    <div id="progress" class="bg-accent-gold h-full rounded-full transition-all" style="width:16.66%"></div>
</div>
</div>

<div class="step" id="s1">
    <h3 class="text-xl font-semibold mb-6">Tambahkan Karakter</h3>
    <div class="glass rounded-2xl p-6 h-72 flex flex-col items-center justify-center border-2 border-dashed border-gray-600 cursor-pointer" id="charUp">
        <input type="file" id="charFile" accept="image/*" class="hidden">
        <div id="charPreview" class="w-full h-full flex items-center justify-center">
            <div class="text-center">
                <i class="fa fa-user-circle text-5xl text-gray-500 mb-4"></i>
                <p class="text-gray-400">Seret foto atau klik</p>
            </div>
        </div>
    </div>
</div>

<div class="step hidden" id="s2">
    <h3 class="text-xl font-semibold mb-6">Tambahkan Produk</h3>
    <div class="glass rounded-2xl p-6 h-72 flex flex-col items-center justify-center border-2 border-dashed border-gray-600 cursor-pointer" id="prodUp">
        <input type="file" id="prodFile" accept="image/*" class="hidden">
        <div id="prodPreview" class="w-full h-full flex items-center justify-center">
            <div class="text-center">
                <i class="fa fa-box text-5xl text-gray-500 mb-4"></i>
                <p class="text-gray-400">Seret foto atau klik</p>
            </div>
        </div>
    </div>
</div>

<div class="step hidden" id="s3"><h3>Langkah 3 Format</h3></div>
<div class="step hidden" id="s4"><h3>Langkah 4 Sudut</h3></div>
<div class="step hidden" id="s5"><h3>Langkah 5 Storyboard</h3></div>
<div class="step hidden" id="s6"><h3>Langkah 6 Ekspor</h3></div>

</main>

<div class="glass fixed bottom-0 left-0 right-0 px-4 py-4 z-40">
<div class="max-w-7xl mx-auto flex justify-between">
<button id="prev" class="glass-light px-6 py-2 rounded-lg" disabled>
    <i class="fa fa-arrow-left mr-2"></i>Sebelumnya
</button>
<button id="next" class="bg-accent-gold text-dark px-6 py-2 rounded-lg font-medium">
    Selanjutnya<i class="fa fa-arrow-right ml-2"></i>
</button>
</div>
</div>

<script>
let current = 1;
const total = 6;

const prev = document.getElementById('prev');
const next = document.getElementById('next');
const progress = document.getElementById('progress');
const stepNum = document.getElementById('stepNum');

function update(){
    document.querySelectorAll('.step').forEach(s=>s.classList.add('hidden'));
    document.getElementById('s'+current).classList.remove('hidden');
    progress.style.width = (current/total)*100+'%';
    stepNum.innerText = current;
    prev.disabled = current===1;

    if(current===total){
        next.innerText = 'Generate Video';
    }else{
        next.innerText = 'Selanjutnya →';
    }
}

prev.onclick = ()=>{ if(current>1){current--;update();} };
next.onclick = ()=>{ if(current<total){current++;update();} };

// UPLOAD KARAKTER 100% WORK HP
document.getElementById('charUp').onclick = ()=> document.getElementById('charFile').click();
document.getElementById('charFile').onchange = function(e){
    const reader = new FileReader();
    reader.onload = ev=>{
        document.getElementById('charPreview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    }
    reader.readAsDataURL(e.target.files[0]);
}

// UPLOAD PRODUK 100% WORK HP
document.getElementById('prodUp').onclick = ()=> document.getElementById('prodFile').click();
document.getElementById('prodFile').onchange = function(e){
    const reader = new FileReader();
    reader.onload = ev=>{
        document.getElementById('prodPreview').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`;
    }
    reader.readAsDataURL(e.target.files[0]);
}

update();
</script>

</body>
</html>
